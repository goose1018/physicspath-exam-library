<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>2022 全国甲 · 第 13 题 · p-T 图 a→b 过原点等容过程</title>
<link rel="stylesheet" href="../../../_shared/q-shell.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="../../../_shared/q-shell.js"></script>
<script>
// 物理：p-T 图上 a→b 是过原点的线段
//   过原点 → p/T = const → 由 pV=nRT 得 V = nRT/p = nR/(p/T) = const → 等容过程
//
// 等容过程（V 不变）：
//   W_对外 = -∫p·dV = 0           → A 错（"一直对外做功"）
//   ΔU > 0（T_b > T_a → 升温）    → B 对（内能增加）
//   ΔU = W + Q → 0 = -W_对外 + Q ... 实际写法：ΔU = Q + W (W 是外界对气体做的功 = 0)
//   或 ΔU = Q - W_对外 = Q（W_对外=0）→ Q = ΔU > 0 → C 对（持续吸热）
//   D 错：Q = ΔU + W_对外 = ΔU + 0 ≠ W_对外
//   E 对：Q = ΔU
//
// 答案 BCE

const T_total = 12;

// p-T 图上 a, b 的位置（任意单位）
const T_a = 1.0, p_a = 1.0;
const T_b = 2.5, p_b = 2.5;     // 同一过原点直线上：p/T = 1.0

function evalState(t){
  const u = Math.max(0, Math.min(t/T_total, 1));
  // 阶段：
  // 0.00-0.10 题面
  // 0.10-0.35 p-T 图绘制（a 点 → 沿过原点线移动到 b 点）
  // 0.35-0.55 体积分析（V=nRT/p，p/T=const → V=const → 等容）
  // 0.55-0.78 能量分析（W=0、ΔU>0、Q=ΔU）
  // 0.78-0.92 4 选项判定
  // 0.92-1.00 答案 BCE
  let phase = 0;
  if(u < 0.10) phase = 0;
  else if(u < 0.35) phase = 1;
  else if(u < 0.55) phase = 2;
  else if(u < 0.78) phase = 3;
  else if(u < 0.92) phase = 4;
  else phase = 5;

  // 状态点位置（沿 a→b 直线插值）
  let curT = T_a, curP = p_a;
  if(u >= 0.10){
    const localU = (u - 0.10) / 0.25;
    const tau = Math.max(0, Math.min(localU, 1));
    curT = T_a + (T_b - T_a) * tau;
    curP = p_a + (p_b - p_a) * tau;
  } else {
    curT = T_a; curP = p_a;
  }
  // 体积（任意单位 V = T/p；p/T = 1 → V = 1 不变）
  const V = curT / curP;
  // 内能（T 越高内能越大；用 T 表示）
  const U_rel = curT;       // 相对内能（任意单位）

  return {u, t, phase, curT, curP, V, U_rel};
}

function drawScene(ctx, view, state, t, opts){
  const W = view.w, H = view.h;
  ctx.fillStyle = '#fffdf9';
  ctx.fillRect(0,0,W,H);

  // 左：p-T 图主图；右：缸内气体可视（V 不变 + T 升 + 颜色变红）
  drawPTGraph(ctx, 14, 14, W*0.55-21, H-28, state);
  drawCylinder(ctx, W*0.55+7, 14, W*0.45-21, H-28, state);
}

function drawPTGraph(ctx, panelX, panelY, panelW, panelH, state){
  ctx.fillStyle = '#fffdf9';
  ctx.strokeStyle = '#eadfce'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(panelX,panelY,panelW,panelH,12);ctx.fill();ctx.stroke();}

  ctx.fillStyle = '#5d6964';
  ctx.font = '800 12px "Noto Sans SC",sans-serif';
  ctx.fillText('p-T 图（a→b 线段过原点）', panelX+12, panelY+18);

  // 坐标系
  const padL = 50, padR = 22, padT = 36, padB = 38;
  const x0 = panelX + padL;
  const y0 = panelY + panelH - padB;
  const xMax = panelX + panelW - padR;
  const yTop = panelY + padT;
  // T 轴 0..3.0；p 轴 0..3.0
  const Trange = 3.0, prange = 3.0;
  const T2px = (TT) => x0 + (TT / Trange) * (xMax - x0);
  const p2py = (pp) => y0 - (pp / prange) * (y0 - yTop);

  // 网格（淡）
  ctx.strokeStyle = '#eee5d2'; ctx.lineWidth = 0.7;
  for(let i = 1; i < 6; i++){
    const xx = x0 + (i / 6) * (xMax - x0);
    ctx.beginPath(); ctx.moveTo(xx, yTop); ctx.lineTo(xx, y0); ctx.stroke();
    const yy = y0 - (i / 6) * (y0 - yTop);
    ctx.beginPath(); ctx.moveTo(x0, yy); ctx.lineTo(xMax, yy); ctx.stroke();
  }

  // 轴
  ctx.strokeStyle = '#3a3a3c'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x0, yTop); ctx.lineTo(x0, y0 + 8);
  ctx.moveTo(x0 - 6, y0); ctx.lineTo(xMax, y0);
  ctx.stroke();
  ctx.fillStyle = '#5d6964'; ctx.font = '700 12px Georgia,serif';
  ctx.fillText('p', x0 - 18, yTop + 6);
  ctx.fillText('T', xMax + 4, y0 + 4);
  ctx.fillText('O', x0 - 12, y0 + 14);

  // a→b 直线（过原点）— 仅在 u≥0.10 显示
  if(state.u >= 0.10){
    ctx.strokeStyle = '#3f6f8f'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(T2px(0), p2py(0));   // 显式从原点起 → 视觉直接表明"过原点"
    ctx.lineTo(T2px(T_b), p2py(p_b));
    ctx.stroke();

    // a 点（绿）
    ctx.fillStyle = '#16613f';
    ctx.beginPath();
    ctx.arc(T2px(T_a), p2py(p_a), 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#16613f'; ctx.font = '900 11px Georgia,serif';
    ctx.fillText('a', T2px(T_a) - 12, p2py(p_a) + 4);

    // b 点（红）
    ctx.fillStyle = '#b4442e';
    ctx.beginPath();
    ctx.arc(T2px(T_b), p2py(p_b), 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#b4442e'; ctx.font = '900 11px Georgia,serif';
    ctx.fillText('b', T2px(T_b) + 6, p2py(p_b) - 4);
  }

  // 状态点（移动）
  if(state.u >= 0.10){
    ctx.fillStyle = '#c2611f';
    ctx.beginPath();
    ctx.arc(T2px(state.curT), p2py(state.curP), 6, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#7d2f1f'; ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  // 等容线对照（u≥0.35 揭晓：通过原点的射线就是 V=const）
  if(state.u >= 0.35){
    ctx.fillStyle = '#16613f'; ctx.font = '700 10px ui-monospace,monospace';
    ctx.fillText('V = nRT/p；p/T = const → V = const（等容）', panelX + 12, panelY + panelH - 16);
  }
}

function drawCylinder(ctx, panelX, panelY, panelW, panelH, state){
  ctx.fillStyle = '#fffdf9';
  ctx.strokeStyle = '#eadfce'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(panelX,panelY,panelW,panelH,12);ctx.fill();ctx.stroke();}

  ctx.fillStyle = '#5d6964';
  ctx.font = '800 12px "Noto Sans SC",sans-serif';
  // 标题：早期阶段中性，u≥0.35（V 推导阶段）后揭晓"V 不变"结论
  const cylTitle = state.u >= 0.35
    ? '刚性容器 V 不变（活塞被锁定 → 等容）'
    : '理想气体容器（体积待分析）';
  ctx.fillText(cylTitle, panelX+12, panelY+18);

  // 容器（刚性矩形）
  const cylX = panelX + panelW * 0.30;
  const cylY = panelY + panelH * 0.20;
  const cylW = panelW * 0.40;
  const cylH = panelH * 0.55;

  // 颜色随温度（绿 #16613f → 红 #b4442e）— 与 p-T 图 a/b 点颜色编码一致
  const tau = (state.curT - T_a) / (T_b - T_a);
  const tauC = Math.max(0, Math.min(tau, 1));
  const r = Math.round(0x16 + (0xb4 - 0x16) * tauC);
  const g = Math.round(0x61 + (0x44 - 0x61) * tauC);
  const b = Math.round(0x3f + (0x2e - 0x3f) * tauC);
  ctx.fillStyle = `rgba(${r},${g},${b},0.30)`;
  ctx.fillRect(cylX, cylY, cylW, cylH);
  ctx.strokeStyle = '#3a3a3c'; ctx.lineWidth = 2.5;
  ctx.strokeRect(cylX, cylY, cylW, cylH);

  // 锁定标记（u≥0.35 揭晓 V=const 后才出现，避免在题面阶段剧透"刚性"）
  if(state.u >= 0.35){
    ctx.strokeStyle = '#7d2f1f'; ctx.lineWidth = 2;
    // 左
    ctx.beginPath();
    ctx.moveTo(cylX - 8, cylY + cylH/2 - 8);
    ctx.lineTo(cylX, cylY + cylH/2 - 8);
    ctx.moveTo(cylX - 8, cylY + cylH/2 + 8);
    ctx.lineTo(cylX, cylY + cylH/2 + 8);
    ctx.stroke();
    // 右
    ctx.beginPath();
    ctx.moveTo(cylX + cylW, cylY + cylH/2 - 8);
    ctx.lineTo(cylX + cylW + 8, cylY + cylH/2 - 8);
    ctx.moveTo(cylX + cylW, cylY + cylH/2 + 8);
    ctx.lineTo(cylX + cylW + 8, cylY + cylH/2 + 8);
    ctx.stroke();
  }

  // 气体粒子（随温度运动速度增大）
  const N = 12;
  for(let i = 0; i < N; i++){
    const seed = i * 1.7;
    const baseX = cylX + cylW * 0.1 + cylW * 0.8 * (0.5 + 0.45 * Math.sin(seed * 2.3));
    const baseY = cylY + cylH * 0.1 + cylH * 0.8 * (0.5 + 0.45 * Math.cos(seed * 1.9));
    const drift = 8 + 18 * tauC;
    const dx = drift * Math.sin(state.t * (1.5 + tauC * 2.0) + seed);
    const dy = drift * Math.cos(state.t * (1.3 + tauC * 2.2) + seed * 0.7);
    const px = Math.max(cylX + 6, Math.min(baseX + dx, cylX + cylW - 6));
    const py = Math.max(cylY + 6, Math.min(baseY + dy, cylY + cylH - 6));
    ctx.fillStyle = `rgba(${r},${g},${b},0.85)`;
    ctx.beginPath();
    ctx.arc(px, py, 2.5, 0, Math.PI*2);
    ctx.fill();
  }

  // 当前 T / p 短标注（始终显示 — 是观察值，非答案）
  ctx.fillStyle = '#5d6964'; ctx.font = '700 10px ui-monospace,monospace';
  const sX = panelX + 14;
  let sY = cylY + cylH + 24;
  ctx.fillText(`T = ${state.curT.toFixed(2)} (相对)`, sX, sY); sY += 16;
  ctx.fillText(`p = ${state.curP.toFixed(2)} (相对)`, sX, sY); sY += 16;
  // V 标注（u≥0.35 推导阶段才显示，去掉"恒定 → 等容"结论后缀）
  if(state.u >= 0.35){
    ctx.fillStyle = '#16613f';
    ctx.fillText(`V = T/p = ${state.V.toFixed(2)}`, sX, sY); sY += 16;
  }

  // 阶段标注
  ctx.fillStyle = '#5d6964'; ctx.font = '700 11px "Noto Sans SC",sans-serif';
  const stageNames = [
    '阶段 ① 题面（a→b 过原点）',
    '阶段 ② 沿 a→b 升温',
    '阶段 ③ V=nRT/p → V 不变',
    '阶段 ④ W=0、ΔU>0、Q=ΔU',
    '阶段 ⑤ 选项判定',
    '阶段 ⑥ 答案'
  ];
  ctx.fillText(stageNames[state.phase], panelX + 12, panelY + panelH - 12);

  // 答案徽章
  if(state.u >= 0.92){
    ctx.fillStyle = '#fdf3e6';
    ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1.5;
    const bX = panelX + panelW - 130, bY = panelY + 12, bW = 118, bH = 30;
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(bX, bY, bW, bH, 8);ctx.fill();ctx.stroke();}
    ctx.fillStyle = '#c2611f';
    ctx.font = '900 14px "Noto Sans SC",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('答案 BCE', bX + bW/2, bY + 20);
    ctx.textAlign = 'start';
  }
}

PathQuestion({

  paperHref: '../../index.html',

  deliv: { title: '理想气体 + 热力学第一定律', sub: 'BCE：内能增 + 持续吸热 + Q=ΔU' },

      'A. 气体一直对外做功',

    ],

  },
  totalT: T_total,

  evalState,
  drawScene,
  phases: [

    {label:'阶段 ② 升温', label_short:'T↑',

     note:'p 与 T 同比例增长。'},
    {label:'阶段 ③ V 不变', label_short:'V=const',
     formula_tex: String.raw`pV = nRT \Rightarrow V = \dfrac{nRT}{p} = \dfrac{nR}{p/T} = \text{const}`,

    {label:'阶段 ④ 能量', label_short:'Q=ΔU',
     formula_tex: String.raw`W_{\text{对外}}=0,\;\Delta U>0,\;Q=\Delta U`,
     note:'等容 → 不做功；T↑ → ΔU>0；热一律 Q=ΔU。'},
    {label:'阶段 ⑤ 选项', label_short:'A/B/C/D/E',
     formula_tex: String.raw`A\;\times\;\;B\;\checkmark\;\;C\;\checkmark\;\;D\;\times\;\;E\;\checkmark`,
     note:'BCE 对。'},

     note:'答案 BCE。'}

    {label:'W 对外',   fmt:s=>(s.u>=0.92? '0' : '?')},
    {label:'ΔU',       fmt:s=>(s.u>=0.92? '> 0（升温）' : '?')},

    {label_text:'C 对', value_text:'一直吸热 ✓',             note:'Q=ΔU>0'},

    {swatch:{bg:'#16613f',border:'#16613f',type:'circle'}, text:'a 点（初态）'},
