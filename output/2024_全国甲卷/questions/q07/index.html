<html lang="zh-CN">

<meta charset="UTF-8">

<title>第 7 题 · 蹦床运动员·F-t 图</title>
<link rel="stylesheet" href="../../../_shared/q-shell.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<body>
<div id="app"></div>
<script src="../../../_shared/q-shell.js"></script>
<script>
// 物理:
// 体重 G_0=600N → 质量 m=60kg
// t=t1 时落到蹦床 (设 t1=0)，蹦床压缩到最低点 t=t2，反弹离开蹦床 t=t3
// t3-t1 = 与蹦床接触时间 Δt_contact
// 运动员离开后做竖直上抛，再回到蹦床。空中时间 = 2*v_离开/g
// 题目给出：从 t3 离开蹦床到 t4 再次落到蹦床经历 Δt_air = 2s （由图读出）
// 由对称性：上升时间 1s，最大高度处时间 t = t3 + 1s
// 离开速度 v = g*1 = 10 m/s（取 g=10）
// 落到蹦床时速度 = -10 m/s
// 平均作用力 F̄: 由动量定理，对接触过程 F̄·Δt_contact - mg·Δt_contact = 2mv
// 设 Δt_contact = 0.5s，v = 10 m/s
// (F̄ - 600)·0.5 = 2·60·10 = 1200
// F̄ - 600 = 2400 → F̄ = 3000 N

// 简化模型：让运动员上下蹦动
const m_jumper = 60;
const g = 10;
const G_0 = m_jumper * g;     // 体重 600N
const v_leave = 10;           // 离开速度
const t_air = 2;              // 空中时间
const t_contact = 0.5;        // 接触时间
const T_period = t_air + t_contact;
const T_total = 5;

function evalState(t){
  const tInPeriod = t % T_period;
  let y, F, v, phase;
  if(tInPeriod < t_air){
    // 空中：上抛 + 下落
    const ta = tInPeriod;
    y = v_leave*ta - 0.5*g*ta*ta;
    v = v_leave - g*ta;
    F = 0;     // 空中蹦床对运动员力为 0
    phase = ta < t_air/2 ? 1 : 2;     // 上升 / 下降
  } else {
    // 接触：半正弦力，让"平均=3000N"与动量定理一致
    // 由 ∫F dt = mg·Δt + 2mv 与 ∫F_peak·sin(πt/Δt) dt = 2·F_peak·Δt/π
    // 得 F_peak = π·(mg·Δt + 2mv)/(2·Δt) = 1500π ≈ 4712 N
    const tc = tInPeriod - t_air;
    const phase_c = tc / t_contact * Math.PI;     // 0..π
    const F_peak = 1500 * Math.PI;     // ≈ 4712 N（峰值，使平均 = 3000 N 自洽）
    F = F_peak * Math.sin(phase_c);
    // 速度变化：从 -v_leave 到 +v_leave
    v = -v_leave + (2*v_leave) * tc / t_contact;
    y = -0.3 * Math.sin(phase_c);     // 蹦床压缩深度
    phase = 3;
  }
  return {phase, y, v, F, t};
}

function drawScene(ctx, view, state, t, opts){
  const W = view.w, H = view.h;
  // 左：运动员 + 蹦床
  drawScene_jumper(ctx, 0, 0, W*0.4, H, state);
  // 右：F-t 图
  drawGraph_Ft(ctx, W*0.4+10, 14, W*0.6-24, H-28, state, t);
}

function drawScene_jumper(ctx, x, y, w, h, state){
  // 蹦床位置 (中间)
  const trampY = y + h*0.75;
  const trampW = w*0.6;
  const trampX = x + (w-trampW)/2;

  // 蹦床支架
  ctx.fillStyle = '#5d6964';
  ctx.fillRect(trampX-8, trampY+10, 8, 60);
  ctx.fillRect(trampX+trampW, trampY+10, 8, 60);

  // 蹦床（变形）
  const compress = state.phase === 3 ? Math.abs(state.y) * 50 : 0;
  ctx.strokeStyle = '#1d1d1f'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(trampX, trampY);
  ctx.quadraticCurveTo(trampX + trampW/2, trampY + compress, trampX + trampW, trampY);
  ctx.stroke();
  ctx.strokeStyle = '#94a09b'; ctx.lineWidth = 1;
  for(let k=0; k<6; k++){
    const px = trampX + (k+0.5)*trampW/6;
    const py = trampY + Math.sin(((k+0.5)/6)*Math.PI)*compress;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px, trampY+10);
    ctx.stroke();
  }

  // 运动员
  const jumpY = state.phase === 3 ? trampY + compress*0.3 : trampY - state.y*30;
  const jumpX = trampX + trampW/2;
  drawPerson(ctx, jumpX, jumpY, state);

  // 力箭头 F (蹦床对运动员)
  if(opts.showVec && state.F > 1){
    const fScale = state.F / 5000 * 60;     // 按峰值 ~5000 缩放
    PPath.arrow(ctx, jumpX, jumpY+30, jumpX, jumpY+30-fScale, '#3f6f8f', 3);
    ctx.fillStyle = '#3f6f8f';
    ctx.font = '700 11px ui-monospace,monospace';
    ctx.fillText('F = '+state.F.toFixed(0)+'N', jumpX+8, jumpY+10);
  }
  // 重力箭头 G
  if(opts.showVec){
    PPath.arrow(ctx, jumpX-3, jumpY-15, jumpX-3, jumpY-15+30, '#b4442e', 2);
    ctx.fillStyle = '#b4442e';
    ctx.font = '700 11px ui-monospace,monospace';
    ctx.fillText('G='+G_0+'N', jumpX-50, jumpY+5);
  }

  // 状态
  const phaseText = ['上升', '下降', '接触·受力'][state.phase-1];
  const phaseColor = ['#16613f', '#c2611f', '#3f6f8f'][state.phase-1];
  ctx.fillStyle = phaseColor;
  ctx.font = '900 14px "Noto Sans SC",sans-serif';
  ctx.fillText(phaseText, x+15, y+24);
  ctx.fillStyle = '#5d6964';
  ctx.font = '600 11px ui-monospace,monospace';
  ctx.fillText('m=60kg, g=10 m/s²', x+15, y+44);
  ctx.fillText('v = '+state.v.toFixed(1)+' m/s', x+15, y+62);
  if(state.phase === 1 || state.phase === 2){
    const h_max = v_leave*v_leave/(2*g);
    ctx.fillText('最高 h = v²/(2g) = '+h_max+' m', x+15, y+80);
  }
}

function drawPerson(ctx, x, y, state){
  // 简笔人形
  const compressed = state.phase === 3;
  const headY = compressed ? y-30 : y-40;
  const torsoBottom = compressed ? y-5 : y-15;

  // 头
  ctx.fillStyle = '#fdf3e6';
  ctx.beginPath(); ctx.arc(x, headY, 8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#5d6964'; ctx.lineWidth = 1.5; ctx.stroke();
  // 身体
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, headY+8); ctx.lineTo(x, torsoBottom); ctx.stroke();
  // 手
  ctx.strokeStyle = '#fdf3e6'; ctx.lineWidth = 3;
  if(state.phase === 1){
    // 上升张开
    ctx.beginPath();
    ctx.moveTo(x, headY+12); ctx.lineTo(x-12, headY+5);
    ctx.moveTo(x, headY+12); ctx.lineTo(x+12, headY+5);
    ctx.stroke();
  } else if(state.phase === 2){
    // 下降向下
    ctx.beginPath();
    ctx.moveTo(x, headY+12); ctx.lineTo(x-10, headY+22);
    ctx.moveTo(x, headY+12); ctx.lineTo(x+10, headY+22);
    ctx.stroke();
  } else {
    // 接触弯曲
    ctx.beginPath();
    ctx.moveTo(x, headY+12); ctx.lineTo(x-8, headY+5);
    ctx.moveTo(x, headY+12); ctx.lineTo(x+8, headY+5);
    ctx.stroke();
  }
  // 腿
  ctx.strokeStyle = '#12352d'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, torsoBottom); ctx.lineTo(x-6, y);
  ctx.moveTo(x, torsoBottom); ctx.lineTo(x+6, y);
  ctx.stroke();
}

function drawGraph_Ft(ctx, x, y, w, h, state, t){
  ctx.fillStyle = '#fffdf9';
  ctx.strokeStyle = '#eadfce'; ctx.lineWidth = 1;
  if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,y,w,h,12); ctx.fill(); ctx.stroke(); }
  else ctx.fillRect(x,y,w,h);

  ctx.fillStyle = '#5d6964';
  ctx.font = '800 12px "Noto Sans SC",sans-serif';
  ctx.fillText('F − t 图（F 为对蹦床作用力 = 蹦床对人作用力·牛三）', x+12, y+18);

  const padL = 38, padR = 14, padT = 28, padB = 28;
  const cw = w-padL-padR, ch = h-padT-padB;
  const x0 = x+padL, y0 = y+padT;
  const X = tv => x0 + (tv % T_period)/T_period * cw;
  const F_peak = 1500 * Math.PI;     // ≈ 4712 N
  const Y = fv => y0+ch - fv/5500 * ch;

  // 轴
  ctx.strokeStyle = '#86868b'; ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(x0, y0); ctx.lineTo(x0, y0+ch);
  ctx.moveTo(x0, y0+ch); ctx.lineTo(x0+cw, y0+ch);
  ctx.stroke();
  ctx.fillStyle = '#1d1d1f';
  ctx.font = 'italic 700 13px Georgia,serif';
  ctx.fillText('t / s', x0+cw+4, y0+ch+5);
  ctx.fillText('F / N', x0-12, y0-4);
  ctx.fillStyle = '#94a09b';
  ctx.font = '10px ui-monospace,monospace';
  // 刻度
  for(let tv=0.5; tv<=T_period; tv+=0.5){
    ctx.fillText(tv.toFixed(1), X(tv)-8, y0+ch+12);
  }
  ctx.fillText('600', x0-26, Y(G_0)+3);
  ctx.fillText('3000', x0-30, Y(3000)+3);
  ctx.fillText('4712', x0-30, Y(F_peak)+3);

  // mg 参考线
  ctx.strokeStyle = 'rgba(180,68,46,.4)'; ctx.lineWidth = 1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(x0, Y(G_0)); ctx.lineTo(x0+cw, Y(G_0)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#b4442e';
  ctx.font = '600 10px ui-monospace,monospace';
  ctx.fillText('G=mg=600N', x0+cw-90, Y(G_0)-3);

  // F-t 曲线（一个完整周期）
  ctx.strokeStyle = '#3f6f8f'; ctx.lineWidth = 2.4;
  ctx.beginPath();
  for(let tv=0; tv<=T_period; tv+=0.02){
    const tInPer = tv;
    let F;
    if(tInPer < t_air) F = 0;
    else {
      const tc = tInPer - t_air;
      F = F_peak * Math.sin(tc/t_contact * Math.PI);
    }
    if(tv===0) ctx.moveTo(X(tv), Y(F));
    else ctx.lineTo(X(tv), Y(F));
  }
  ctx.stroke();

  // 当前点
  ctx.fillStyle = '#c2611f';
  const tInP = t % T_period;
  ctx.beginPath(); ctx.arc(X(tInP), Y(state.F), 5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

  // 阶段标记区域
  ctx.fillStyle = 'rgba(63,111,143,.08)';
  ctx.fillRect(X(t_air), y0, X(T_period)-X(t_air), ch);
  ctx.fillStyle = '#3f6f8f';
  ctx.font = '700 11px "Noto Sans SC",sans-serif';
  ctx.fillText('接触 0.5s', X(t_air)+10, y0+30);
  ctx.fillText('空中 2s', x0+30, y0+30);

  // 平均力计算
  ctx.fillStyle = '#c2611f';
  ctx.font = '900 12px "Noto Sans SC",sans-serif';
  ctx.fillText('F̄·Δt − mg·Δt = 2mv → F̄ = 3000 N', x+12, y+h-12);
}
