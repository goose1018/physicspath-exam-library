<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>第 18 题 · 动量守恒（斜槽碰撞 + 摆球）</title>
<link rel="stylesheet" href="../../../_shared/q-shell.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="../../../_shared/q-shell.js"></script>
<script>
// 两版动量守恒验证：
// 版本 1（斜槽 + 平抛）：m₁·OP = m₁·OM + m₂·ON
// 版本 2（摆球碰撞）：ml₁ = -ml₂ + Ml₃ (l 是弦长，正比于速度)

const T_total = 8;
const stageDur = 4;     // 两版各 4s

function evalState(t){
  const stage = Math.floor((t/stageDur) % 2);
  const u = (t - stage*stageDur)/stageDur;
  return {phase:stage+1, stage, u, t};
}

function drawScene(ctx, view, state, t, opts){
  const W = view.w, H = view.h;
  ctx.fillStyle = '#fffdf9';
  ctx.fillRect(0,0,W,H);

  if(state.stage === 0){
    drawProjectileVersion(ctx, state);
  } else {
    drawPendulumVersion(ctx, state);
  }

  // 答案
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1.5;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(W-360, H-44, 348, 32, 8);ctx.fill();ctx.stroke();}
  ctx.fillStyle = '#c2611f';
  ctx.font = '900 12px "Noto Sans SC",sans-serif';
  ctx.fillText('(1) AC  (2) m₁·OP = m₁·OM + m₂·ON  (3) ml₁ = -ml₂ + Ml₃', W-348, H-22);
}

function drawProjectileVersion(ctx, state){
  const W = ctx.canvas.width / (devicePixelRatio||1);
  const H = ctx.canvas.height / (devicePixelRatio||1);

  ctx.fillStyle = '#5d6964';
  ctx.font = '800 13px "Noto Sans SC",sans-serif';
  ctx.fillText('版本 1：斜槽 + 平抛 · m₁·OP = m₁·OM + m₂·ON', 24, 22);

  // 桌面 + 斜槽 + 木板
  const tableY = H*0.35;
  const tableX0 = 30, tableX1 = W*0.4;
  ctx.fillStyle = '#5d6068';
  ctx.fillRect(tableX0, tableY, tableX1-tableX0, 8);
  // 斜槽
  ctx.strokeStyle = '#86868b'; ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(tableX0+30, tableY-80);
  ctx.quadraticCurveTo(tableX0+50, tableY+10, tableX1-30, tableY-2);
  ctx.lineTo(tableX1, tableY-2);
  ctx.stroke();
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('S', tableX0+15, tableY-78);

  // 木板（地面）
  const boardY = H*0.78;
  ctx.fillStyle = '#dad6c8';
  ctx.fillRect(tableX1-30, boardY, W-tableX1, 8);
  ctx.fillStyle = '#fdfaf2';
  ctx.fillRect(tableX1-30, boardY-3, W-tableX1, 3);

  // O 点（斜槽末端正下方在地面上）
  const Ox = tableX1, Oy = boardY;
  ctx.fillStyle = '#1d1d1f';
  ctx.beginPath(); ctx.arc(Ox, Oy, 4, 0, Math.PI*2); ctx.fill();
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('O', Ox-12, Oy+18);

  // 三个落点 P, M, N（按物理 OP > ON > OM）
  const Px = Ox + 240, Mx = Ox + 80, Nx = Ox + 180;
  drawHit(ctx, Px, Oy, '#3f6f8f', 'P  (m₁ 单独)');
  drawHit(ctx, Mx, Oy, '#c2611f', 'M  (m₁ 碰后)');
  drawHit(ctx, Nx, Oy, '#16613f', 'N  (m₂ 碰后)');

  // 距离尺
  drawRulerLine(ctx, Ox, Px, Oy+30, '#3f6f8f', 'OP');
  drawRulerLine(ctx, Ox, Mx, Oy+50, '#c2611f', 'OM');
  drawRulerLine(ctx, Ox, Nx, Oy+70, '#16613f', 'ON');

  // 平抛轨迹动画（基于 state.u 演示三种小球飞行）
  // u in [0, 0.33]: 单球落到 P；[0.33, 0.66]: m₁ 落到 M；[0.66, 1.0]: m₂ 落到 N
  const fallH = boardY - tableY - 2;     // 平抛下落高度
  function projectileXY(targetX, k){
    // k ∈ [0,1]: 平抛过程进度。x 线性 (匀速)，y 二次 (重力加速)
    const dxRange = targetX - Ox;
    const x = Ox + dxRange * k;
    const y = (tableY-2) + fallH * k * k;     // y 抛物线
    return {x, y};
  }
  // 抛物线虚线（OP/OM/ON 三条轨迹同时显示便于对比）
  function drawTrajectory(targetX, color){
    ctx.strokeStyle = color; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
    ctx.beginPath();
    for(let k=0; k<=1; k+=0.05){
      const p = projectileXY(targetX, k);
      if(k===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }
  drawTrajectory(Px, 'rgba(63,111,143,0.35)');
  drawTrajectory(Mx, 'rgba(194,97,31,0.35)');
  drawTrajectory(Nx, 'rgba(22,97,63,0.35)');

  // 当前球（按阶段切换）
  const u = state.u;
  let activeBall = null;
  if(u < 0.33){
    const k = u/0.33;
    const p = projectileXY(Px, k);
    activeBall = {x:p.x, y:p.y, color:'#3f6f8f', label:'m₁'};
  } else if(u < 0.66){
    const k = (u-0.33)/0.33;
    const p = projectileXY(Mx, k);
    activeBall = {x:p.x, y:p.y, color:'#c2611f', label:'m₁'};
  } else {
    const k = (u-0.66)/0.34;
    const p = projectileXY(Nx, k);
    activeBall = {x:p.x, y:p.y, color:'#16613f', label:'m₂'};
  }
  if(activeBall){
    ctx.fillStyle = activeBall.color;
    ctx.beginPath(); ctx.arc(activeBall.x, activeBall.y, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '700 9px "Noto Sans SC",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(activeBall.label, activeBall.x, activeBall.y+3);
    ctx.textAlign = 'left';
  }

  // 公式
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(20, H-150, 360, 100, 8);ctx.fill();ctx.stroke();}
  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('(1) 实验前提：A 末端水平 + C 大碰小（不反弹）', 32, H-130);
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 12px "Cambria Math",serif';
  ctx.fillText('平抛 t 相同 → v ∝ x（水平位移）', 32, H-110);
  ctx.fillText('动量守恒：m₁·v₀ = m₁·v_a\' + m₂·v_b\'', 32, H-90);
  ctx.fillStyle = '#16613f';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('m₁·OP = m₁·OM + m₂·ON', 32, H-66);
}

function drawPendulumVersion(ctx, state){
  const W = ctx.canvas.width / (devicePixelRatio||1);
  const H = ctx.canvas.height / (devicePixelRatio||1);

  ctx.fillStyle = '#5d6964';
  ctx.font = '800 13px "Noto Sans SC",sans-serif';
  ctx.fillText('版本 2：双摆球碰撞 · 弦长 l 正比于速度 → ml₁ = -ml₂ + Ml₃', 24, 22);

  // 双摆同挂点（实验装置：两球紧靠，挂在同一支架上，最低点重合便于碰撞）
  const xC = W*0.45;     // 共同挂点 x
  const yCeil = 50;
  const L_rope = 200;
  // 支架（横梁）
  ctx.fillStyle = '#5d6068';
  ctx.fillRect(xC-100, yCeil-10, 200, 8);
  ctx.fillStyle = '#1d1d1f';
  ctx.beginPath(); ctx.arc(xC, yCeil-2, 3, 0, Math.PI*2); ctx.fill();

  // 阶段：
  // u in [0, 0.4]: 球 1 (m) 从 A 摆到 B 最低点（球 2 静止在最低点）
  // u in [0.4, 1.0]: 碰后，球 1 反弹到 A'（左小角），球 2 摆到 D（右）
  const phaseU = state.u;
  const angA = -Math.PI/4;     // 球 1 起始角（左侧 45°）
  const angAp = Math.PI/8;     // 球 1 碰后反弹左侧小角
  const angD = Math.PI/6;      // 球 2 碰后摆到右侧 D 的角
  let theta1, theta2;
  if(phaseU < 0.4){
    const k = phaseU / 0.4;
    theta1 = angA * (1 - k);     // -π/4 → 0
    theta2 = 0;                   // 球 2 静止在最低点
  } else {
    const k = (phaseU - 0.4) / 0.6;
    // 摆球甩出 → 摆回 (类似 sin) — 简单线性到最高点
    const swing = Math.sin(k * Math.PI);     // 0 → 1 → 0
    theta1 = angAp * swing;     // 球 1 反弹到 A' 又回最低点
    theta2 = angD * swing;      // 球 2 摆到 D 又回最低点
  }

  // 球 1 挂在 xC，碰撞前从左侧摆下
  const ball1_x = xC + L_rope*Math.sin(theta1);
  const ball1_y = yCeil + L_rope*Math.cos(theta1);
  ctx.strokeStyle = '#5d6964'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(xC, yCeil); ctx.lineTo(ball1_x, ball1_y); ctx.stroke();
  ctx.fillStyle = '#c2611f';
  ctx.beginPath(); ctx.arc(ball1_x, ball1_y, 10, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = '700 11px "Noto Sans SC",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('m', ball1_x, ball1_y+4);

  // 球 2 也挂在 xC（紧靠，但视觉略偏 +x 让两球可见区分）
  // 球 2 摆动时从最低点（xC, yCeil+L_rope）出发，大球用更大半径
  const ball2_x = xC + L_rope*Math.sin(theta2);
  const ball2_y = yCeil + L_rope*Math.cos(theta2);
  ctx.strokeStyle = '#5d6964'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(xC, yCeil); ctx.lineTo(ball2_x, ball2_y); ctx.stroke();
  ctx.fillStyle = '#3f6f8f';
  ctx.beginPath(); ctx.arc(ball2_x, ball2_y, 13, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.fillText('M', ball2_x, ball2_y+4);
  ctx.textAlign = 'left';

  // 碰撞瞬间高亮（u≈0.4）
  if(Math.abs(phaseU - 0.4) < 0.05){
    ctx.strokeStyle = '#b4442e'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(xC, yCeil + L_rope, 24, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = '#b4442e';
    ctx.font = '900 11px "Noto Sans SC",sans-serif';
    ctx.fillText('碰撞瞬间', xC + 28, yCeil + L_rope + 4);
  }

  // 标记 A, B, A', D（基于 xC 共同挂点）
  ctx.fillStyle = '#94a09b';
  ctx.font = '600 10px "Noto Sans SC",sans-serif';
  ctx.fillText('A (m 起始)', xC + L_rope*Math.sin(angA) - 30, yCeil + L_rope*Math.cos(angA) + 18);
  ctx.fillText('B (碰撞点)', xC - 25, yCeil + L_rope + 24);
  ctx.fillText("A' (m 反弹)", xC + L_rope*Math.sin(angAp) + 8, yCeil + L_rope*Math.cos(angAp) + 18);
  ctx.fillText('D (M 最高)', xC + L_rope*Math.sin(angD) + 8, yCeil + L_rope*Math.cos(angD) + 18);

  // 公式
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(20, H-150, 380, 100, 8);ctx.fill();ctx.stroke();}
  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('弦长正比于速度（动能定理 + 几何）', 32, H-130);
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 12px "Cambria Math",serif';
  ctx.fillText('½m·v² = mg·h，h = L(1-cosθ)，l = 2L·sin(θ/2)', 32, H-110);
  ctx.fillText('→ v ∝ l，所以 m₁·v₁ = -m·v₂ + M·v₃ ⇔', 32, H-90);
  ctx.fillStyle = '#16613f';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('ml₁ = -ml₂ + Ml₃', 32, H-66);
}

function drawHit(ctx, x, y, color, label){
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = '900 11px "Noto Sans SC",sans-serif';
  ctx.fillText(label, x-25, y-12);
}
function drawRulerLine(ctx, x0, x1, y, color, label){
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x0, y); ctx.lineTo(x1, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x0, y-3); ctx.lineTo(x0, y+3); ctx.moveTo(x1, y-3); ctx.lineTo(x1, y+3); ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = '700 10px "Cambria Math",serif';
  ctx.fillText(label, (x0+x1)/2-12, y-6);
}

PathQuestion({
  paperTitle: '2024 北京卷',
  paperHref: '../../index.html',
  eyebrow: '实验 · 第 18 题',

  subtitle: '两种装置验证动量守恒：(a) 斜槽 + 平抛落点；(b) 双摆球碰撞 + 弦长。',
  deliv: {

    sub: 'm₁·OP = m₁·OM + m₂·ON · ml₁ = -ml₂ + Ml₃'

    subQuestions: [

      '(2) 平均落点确定方法 + 验证关系式 ____',
      '(3) 受启发的双摆方案，弦长 AB = l₁、A\'B = l₂、CD = l₃，验证关系式 ____'
    ],
    officialAnswer: '(1) AC（A 对：保证平抛；B 错：半径需相同；C 对：避免反弹）。(2) 用最小圆覆盖落点取圆心；m₁·OP = m₁·OM + m₂·ON。(3) ml₁ = -ml₂ + Ml₃（弦长 ∝ 速度）。'
  },

     note:'两球离开斜槽末端 h 相同 → t 相同 → v ∝ 水平位移。动量守恒等价于 OP = OM + (m₂/m₁)·ON。'},
    {label:'版本 2 · 双摆 + 弦长', label_short:'摆球',
     formula_tex: String.raw`ml_1 = -m l_2 + M l_3`,
     note:'摆球摆到最高点 h = L(1-cosθ)，弦长 l = 2L·sin(θ/2)。由 ½v² = gh + 几何 → v ∝ l。所以动量方程换成弦长方程。'}

    {label:'(2) 答',  fmt:()=>'m₁·OP = m₁·OM + m₂·ON'},

  ],

  ],
  legend: [
    {swatch:{bg:'#3f6f8f',border:'#3f6f8f',type:'dot'}, text:'P 落点（单球）'},
