<html lang="zh-CN">

<title>第 11 题 · 双绳缓降重物</title>
<link rel="stylesheet" href="../../../_shared/q-shell.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<body>
<div id="app"></div>
<script src="../../../_shared/q-shell.js"></script>
<script>
// 物理参数（题目典型设定）：
// m = 8 kg, g = 10 m/s²
// P 绳与竖直夹角 α = 53°（cos 0.6, sin 0.8），高处操作
// Q 绳与竖直夹角 β = 37°（cos 0.8, sin 0.6），地面操作
// 缓降 → 平衡（合力 = 0，加速度 = 0）
// 水平：T_P sinα = T_Q sinβ  →  T_P · 0.8 = T_Q · 0.6  →  T_Q = (4/3) T_P
// 竖直：T_P cosα + T_Q cosβ = mg  →  0.6 T_P + 0.8 T_Q = 80
//        →  T_P = 48 N, T_Q = 64 N
// (2) h = 10 m，缓降 ΔKE=0  →  W_绳 + W_重 = 0  →  W_绳 = -mgh = -800 J

const m = 8, g = 10;
const alpha = 53*Math.PI/180;     // P 角
const beta  = 37*Math.PI/180;     // Q 角
const T_P = 48;
const T_Q = 64;
const h = 10;
const W_rope_total = -m*g*h;     // -800 J

const T_total = 5;

function evalState(t){
  // 题目问的是 α=53°、β=37° 这个特定瞬间的张力（其他时刻角度不同 → 张力不同）
  // 所以保持物体在该几何配置上不动，演示力分析；下降过程只用文字 + (2) 总功公式说明
  const u = Math.min(1, t/T_total);
  const phase = u < 0.5 ? 1 : 2;     // 1 受力分析, 2 强调能量
  return {phase, u, t};
}

function drawScene(ctx, view, state, t, opts){
  const W = view.w, H = view.h;
  ctx.fillStyle = '#fffdf9';
  ctx.fillRect(0,0,W,H);

  // 高楼（左上 P 控点）
  const wallX = 80, wallY = 60;
  ctx.fillStyle = '#5d6068';
  ctx.fillRect(wallX-30, 0, 30, H);     // 墙
  // 窗户
  ctx.fillStyle = '#94a09b';
  ctx.fillRect(wallX-25, wallY, 20, 30);
  ctx.strokeStyle = '#1d1d1f'; ctx.lineWidth = 1;
  ctx.strokeRect(wallX-25, wallY, 20, 30);
  // P 操作员（高处）
  ctx.fillStyle = '#c2611f';
  ctx.beginPath(); ctx.arc(wallX-15, wallY+15, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5d6964';
  ctx.font = '700 11px "Noto Sans SC",sans-serif';
  ctx.fillText('P 端（高处）', wallX-25, wallY-6);

  // 地面
  const yGround = H - 50;
  ctx.fillStyle = '#dad6c8';
  ctx.fillRect(0, yGround, W, H-yGround);
  // Q 操作员（地面，远离墙）
  const Q_x = W - 100, Q_y = yGround;
  ctx.fillStyle = '#3f6f8f';
  ctx.beginPath(); ctx.arc(Q_x, Q_y-10, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5d6964';
  ctx.font = '700 11px "Noto Sans SC",sans-serif';
  ctx.fillText('Q 端（地面）', Q_x-25, Q_y-26);

  // P 锚点（高处）
  const P_x = wallX, P_y = wallY+15;

  // ─── 物体位置：由角度反推（保证 α=53°、β=37° 几何一致） ───
  // 设物体中心 (objX, objY)。绳 P 从 P 指向物体，与竖直 53°；绳 Q 从 Q 指向物体，与竖直 37°。
  // 即：(objX - P_x)/(objY - P_y) = tan(53°) = 0.8/0.6 = 4/3   →  objX - P_x = (4/3)·(objY - P_y)
  //     (Q_x - objX)/(objY - Q_y) = tan(37°) = 0.6/0.8 = 3/4   →  Q_x - objX = (3/4)·(objY - Q_y)
  // 两式联立解出 objX、objY（演示固定一组合理几何）
  // 解：let dy_P = objY - P_y (>0)，dy_Q = objY - Q_y (Q_y 是地面高度，objY 在地面以上 → dy_Q<0)
  // 我们直接选定 objY，反推 objX 一致性
  const objY = yGround - 90;     // 物体距地面约 90px
  // 由 α 几何：objX = P_x + (4/3)*(objY - P_y)
  const objX = P_x + (4/3)*(objY - P_y);
  // 验证 β 几何（仅用于调试，不强制）：objX_check_from_Q = Q_x - (3/4)*(Q_y - objY)
  // 实际 Q 锚点（地面操作员位置）由几何反推，让 β=37°
  const Q_x_actual = objX + (3/4)*(Q_y - objY);
  // 重新画 Q 操作员（覆盖前面那个估测位置 — 矩形扩大到完全覆盖旧文字"Q 端（地面）"）
  ctx.fillStyle = '#dad6c8';     // 与地面同色，避免遗留白块
  ctx.fillRect(Q_x-50, Q_y-32, 80, 32);     // 覆盖旧圆点 + 旧标签
  ctx.fillStyle = '#3f6f8f';
  ctx.beginPath(); ctx.arc(Q_x_actual, Q_y-10, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5d6964';
  ctx.font = '700 11px "Noto Sans SC",sans-serif';
  ctx.fillText('Q 端（地面）', Q_x_actual-25, Q_y-26);

  // 绳 P→物体 / Q→物体（用 Q_x_actual）
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(P_x, P_y); ctx.lineTo(objX, objY); ctx.stroke();
  ctx.strokeStyle = '#3f6f8f'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(Q_x_actual, Q_y); ctx.lineTo(objX, objY); ctx.stroke();

  // 物体（黑盒）— 中心点是 (objX, objY)，矩形向上下展开
  const boxW = 44, boxH = 30;
  const boxL = objX - boxW/2, boxT = objY - boxH/2;
  ctx.fillStyle = '#444a52';
  ctx.fillRect(boxL, boxT, boxW, boxH);
  ctx.strokeStyle = '#1d1d1f'; ctx.lineWidth = 1;
  ctx.strokeRect(boxL, boxT, boxW, boxH);
  ctx.fillStyle = '#fdfaf2';
  ctx.font = '700 10px "Noto Sans SC",sans-serif';
  ctx.fillText('m=8kg', objX-15, objY+4);

  // 竖直参考线（用于标 α、β）
  ctx.strokeStyle = '#94a09b'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(P_x, P_y); ctx.lineTo(P_x, P_y+50); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(Q_x_actual, Q_y); ctx.lineTo(Q_x_actual, Q_y-50); ctx.stroke();
  ctx.setLineDash([]);

  // ─── 角度弧（用 canvas 坐标直接算，自动选小弧方向） ───
  // P 端：参考竖直向下 (canvas π/2)，扫向 P 绳方向
  const ropeAng_P = Math.atan2(objY - P_y, objX - P_x);     // canvas 角度
  drawAngleArc(ctx, P_x, P_y, 28, Math.PI/2, ropeAng_P, '#c2611f', 'α=53°');
  // Q 端：参考竖直向上 (canvas -π/2)，扫向 Q 绳方向
  const ropeAng_Q = Math.atan2(objY - Q_y, objX - Q_x_actual);     // canvas 角度
  drawAngleArc(ctx, Q_x_actual, Q_y, 28, -Math.PI/2, ropeAng_Q, '#3f6f8f', 'β=37°');

  // ─── 三力共点受力分析（共质心 objX, objY） ───
  // mg 向下
  PPath.arrow(ctx, objX, objY, objX, objY + 50, '#b4442e', 2);
  ctx.fillStyle = '#b4442e';
  ctx.font = '700 11px "Cambria Math",serif';
  ctx.fillText('mg = 80 N', objX+8, objY+45);

  // T_P 沿 P 绳指向 P（向左上）
  const T_P_dir_x = (P_x - objX), T_P_dir_y = (P_y - objY);
  const Lp = Math.hypot(T_P_dir_x, T_P_dir_y);
  const T_P_scale = 48 * 0.8;     // 张力大小映射到像素长度（48 N ≈ 38 px）
  PPath.arrow(ctx, objX, objY, objX + T_P_dir_x*T_P_scale/Lp, objY + T_P_dir_y*T_P_scale/Lp, '#c2611f', 2);
  ctx.fillStyle = '#c2611f';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('T_P=48N', objX + T_P_dir_x*T_P_scale/Lp - 60, objY + T_P_dir_y*T_P_scale/Lp);

  // T_Q 沿 Q 绳指向 Q（向右下）
  const T_Q_dir_x = (Q_x_actual - objX), T_Q_dir_y = (Q_y - objY);
  const Lq = Math.hypot(T_Q_dir_x, T_Q_dir_y);
  const T_Q_scale = 64 * 0.8;     // 64 N ≈ 51 px
  PPath.arrow(ctx, objX, objY, objX + T_Q_dir_x*T_Q_scale/Lq, objY + T_Q_dir_y*T_Q_scale/Lq, '#3f6f8f', 2);
  ctx.fillStyle = '#3f6f8f';
  ctx.fillText('T_Q=64N', objX + T_Q_dir_x*T_Q_scale/Lq + 6, objY + T_Q_dir_y*T_Q_scale/Lq);

  // 高度尺
  ctx.strokeStyle = '#94a09b'; ctx.setLineDash([3,3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W-20, P_y); ctx.lineTo(W-20, yGround); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#94a09b';
  ctx.font = '700 10px ui-monospace,monospace';
  ctx.save();
  ctx.translate(W-12, (P_y+yGround)/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('h = 10 m', -22, 0);
  ctx.restore();

  // 数据卡
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(20, 20, 280, 88, 8);ctx.fill();ctx.stroke();}
  ctx.fillStyle = '#a85219';
  ctx.font = '900 12px "Noto Sans SC",sans-serif';
  ctx.fillText('受力平衡（缓降 → a=0）', 32, 38);
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 11.5px "Cambria Math",serif';
  ctx.fillText('水平：T_P sin53° = T_Q sin37°', 32, 58);
  ctx.fillText('竖直：T_P cos53° + T_Q cos37° = mg', 32, 76);
  ctx.fillStyle = '#16613f';
  ctx.font = '900 12px "Noto Sans SC",sans-serif';
  ctx.fillText('解：T_P = 48 N · T_Q = 64 N', 32, 96);

  // 答案
  if(state.u > 0.5){
    ctx.fillStyle = '#fdf3e6';
    ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1.5;
    if(ctx.roundRect){ctx.beginPath();ctx.roundRect(W-260, 20, 240, 60, 8);ctx.fill();ctx.stroke();}
    ctx.fillStyle = '#c2611f';
    ctx.font = '900 12.5px "Noto Sans SC",sans-serif';
    ctx.fillText('(1) T_P = 48 N, T_Q = 64 N', W-250, 40);
    ctx.fillText('(2) W_绳 = −mgh = −800 J', W-250, 62);
  }

  // 当前高度
  ctx.fillStyle = '#5d6964';
  ctx.font = '600 11px ui-monospace,monospace';
  ctx.fillText(`α=53° (sin=0.8, cos=0.6) · β=37° (sin=0.6, cos=0.8) · 该瞬时配置`, 24, H-20);
}

function drawAngleArc(ctx, cx, cy, r, refCanvas, ropeCanvas, color, label){
  // 直接传入 canvas 标准角度（0=+x, π/2=+y/down, -π/2=-y/up），自动选小弧
  let delta = ropeCanvas - refCanvas;
  // 归一化到 (-π, π]，确保 |delta| 是两角的最小差
  while(delta > Math.PI) delta -= 2*Math.PI;
  while(delta < -Math.PI) delta += 2*Math.PI;
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.beginPath();
  // delta < 0 → anticlockwise (canvas 角度减小)；delta > 0 → 顺时针默认
  ctx.arc(cx, cy, r, refCanvas, refCanvas + delta, delta < 0);
  ctx.stroke();
  // label 在弧的中点偏外
  const midAng = refCanvas + delta/2;
  ctx.fillStyle = color;
  ctx.font = 'italic 700 12px Georgia,serif';
  ctx.fillText(label, cx + (r+10)*Math.cos(midAng) - 14, cy + (r+10)*Math.sin(midAng) + 4);
}

PathQuestion({
  paperTitle: '2024 新课标卷',
  paperHref: '../../index.html',

  deliv: {

  },

    subQuestions: [
      '(1) 求此时 P、Q 绳中拉力的大小；',
      '(2) 若开始竖直下降时重物距地面高度 h = 10 m，求重物下降到地面的过程中两根绳子拉力对重物做的总功。'
    ],
    officialAnswer: '(1) 缓降 a=0 → 受力平衡。水平 T_P sin53° = T_Q sin37° → T_P = (3/4) T_Q。竖直 T_P cos53° + T_Q cos37° = mg → 0.6T_P + 0.8T_Q = 80。联立解得 T_P = 48 N, T_Q = 64 N。(2) 缓降 ΔKE = 0，由动能定理 W_合 = 0 → W_绳 + W_重 = 0 → W_绳 = −W_重 = −mgh = −800 J。'
  },
  totalT: T_total,
  speedFactor: 0.6,
  evalState,
  drawScene,
  phases: [
    {label:'阶段 1 · 缓降 + 受力平衡', label_short:'下降',
     formula_tex: String.raw`\sum F = 0:\;\;T_P\sin\alpha = T_Q\sin\beta,\;\;T_P\cos\alpha + T_Q\cos\beta = mg`,
     note:'缓降 → 加速度 0 → 合力 0。水平、竖直分别列方程联立解出两绳张力。'},
    {label:'阶段 2 · 落地 + 能量', label_short:'落地',
     formula_tex: String.raw`W_{\text{绳}} = -mgh = -800\;\text{J}`,
     note:'缓降 ΔKE = 0 → 由动能定理 W_合 = 0 → 绳做的功 = -重力做的功 = −mgh。'}
  ],
  stats: [
    {label:'m',           fmt:()=>'8 kg'},
    {label:'g',           fmt:()=>'10 m/s²'},
    {label:'α (P 角)',    fmt:()=>'53°'},
    {label:'β (Q 角)',    fmt:()=>'37°'},
    {label:'T_P',         fmt:()=>'48 N'},
    {label:'T_Q',         fmt:()=>'64 N'},
    {label:'h',           fmt:()=>'10 m'},
    {label:'W_绳',        fmt:()=>'−800 J'}
  ],
  conclusions: [
    {label_text:'(1) T_P', value_text:'48 N', note:''},

    {label_text:'(2) W',    value_text:'−800 J', note:'缓降 ΔKE=0'}
  ],

    {swatch:{bg:'#c2611f',border:'#c2611f',type:'rect'}, text:'P 绳（高处操作）'},

    {swatch:{bg:'#b4442e',border:'#b4442e',type:'rect'}, text:'重力 mg'},
    {swatch:{bg:'#444a52',border:'#444a52',type:'rect'}, text:'重物 m=8kg'}
