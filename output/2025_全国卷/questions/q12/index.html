<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>第 12 题 · 圆弧+弹簧+板 4 问</title>
<link rel="stylesheet" href="../../../_shared/q-shell.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="../../../_shared/q-shell.js"></script>
<script>
// 假设题给"速度减小到接触时的 1/√2 倍"时弹簧 EP=2mgR
// (1) 小球从 A（弧顶）到弧底，重力做功 = mgR
// (2) 接触瞬间 v₀，能量守恒 ½mv₀² - ½m(v₀/√2)² = 2mgR
//     → ¼mv₀² = 2mgR → v₀² = 8gR → v₀ = 2√(2gR)
//     B 点自由落到 A 点：v_A² = 2g·h_BA
//     A 到弧底光滑：½m·v_A² + mgR = ½m·v₀²
//     → v_A² = v₀² - 2gR = 6gR → h_BA = 3R
// (3) 断开 P-Q 时小球速度 v₁ = v₀/√2，弹簧 EP = 2mgR
//     共速时 EP_max = 2.2mgR
//     动量守恒：m·v₁ = (m+M)·v_共
//     能量守恒：½m·v₁² + 2mgR = ½(m+M)·v_共² + 2.2mgR
//     → ½m·v₁²·M/(m+M) = 0.2mgR
//     v₁² = 4gR (因 v₁ = v₀/√2, v₀²=8gR)
//     2mgR·M/(m+M) = 0.2mgR → M/(m+M) = 0.1 → M = m/9
// (4) Q 最终动能最大：弹簧恢复原长 + 小球速度 = 0
//     动量守恒：m·v₁ = M'·v_Q → v_Q = m·v₁/M'
//     能量守恒：½m·v₁² + 2mgR = ½M'·v_Q²
//     → ½m·v₁² + 2mgR = m²v₁²/(2M')
//     v₁²=4gR: 2mgR + 2mgR = m²·4gR/(2M') = 2m²gR/M'
//     4mgR = 2m²gR/M' → M' = m/2

const T_total = 12;
const stageDur = 3;     // 4 阶段（4 问轮播）

function evalState(t){
  const stage = Math.floor((t/stageDur) % 4);
  const u = (t - stage*stageDur)/stageDur;
  return {phase:stage+1, stage, u, t};
}

function drawScene(ctx, view, state, t, opts){
  const W = view.w, H = view.h;
  ctx.fillStyle = '#fffdf9';
  ctx.fillRect(0,0,W,H);

  // 顶部
  const titles = [
    '(1) 重力做功（A 到弧底）',
    '(2) v₀ 和 B-A 距离',
    '(3) 弹簧最大势能 = 2.2mgR 时 Q 质量',
    '(4) Q 动能最大时 Q 质量'
  ];
  ctx.fillStyle = '#5d6964';
  ctx.font = '800 12.5px "Noto Sans SC",sans-serif';
  ctx.fillText(titles[state.stage], 24, 22);

  if(state.stage === 0) drawStage1(ctx, 14, 40, W-28, H-60, state);
  else if(state.stage === 1) drawStage2(ctx, 14, 40, W-28, H-60, state);
  else if(state.stage === 2) drawStage3(ctx, 14, 40, W-28, H-60, state);
  else drawStage4(ctx, 14, 40, W-28, H-60, state);
}

// 通用：画装置（P 块带右上凹弧 + Q 板紧挨右侧 + 弹簧 + 小球）
// 几何（按原题）：
//   - P 是带凹弧的物块，立在地面，高度 = R + Q板厚
//   - P 上表面右端是弧顶 A（高位），弧从 A 凹下到 Q 板上表面（弧底）
//   - Q 板紧挨 P 右下侧，水平薄板，上表面与弧底等高
//   - 弹簧水平放在 Q 上，左端为弹簧自由端（小球压这里），右端固定（在 Q 板末端立柱）
function drawApparatus(ctx, x, y, w, h, ballPos, qOffset){
  ctx.fillStyle = '#fffdf9';
  ctx.strokeStyle = '#eadfce'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x,y,w,h,12);ctx.fill();ctx.stroke();}

  // 地面
  const yGround = y + h - 30;
  ctx.fillStyle = '#dad6c8';
  ctx.fillRect(x+20, yGround, w-40, 5);
  // 地面网格（细短线表示固定）
  ctx.strokeStyle = '#9a8e72'; ctx.lineWidth = 1;
  for(let xi = x+24; xi < x+w-24; xi += 14){
    ctx.beginPath(); ctx.moveTo(xi, yGround+5); ctx.lineTo(xi-4, yGround+10); ctx.stroke();
  }

  // 几何参数（缩小装置 + 左移，让推导卡（右半）不重叠）
  const Rpx = 45;          // 弧半径
  const H_Q = 9;           // Q 板厚度
  const H_P = Rpx + H_Q;   // P 块总高
  const W_P_left = 48;     // P 块左侧矩形部分宽度（不含弧凹陷区）

  // P 块基准
  const P_left_x = x + w*0.05;
  const P_top_y = yGround - H_P;     // P 块上表面 y
  // 弧顶 A 在 P 上表面右端
  const A_x = P_left_x + W_P_left;
  const A_y = P_top_y;
  // 弧底（与 Q 板上表面等高）
  const arcBot_x = A_x + Rpx;
  const arcBot_y = A_y + Rpx;        // = yGround - H_Q
  // 圆心：A 正右方 R（由切线条件：A 处切线竖直、弧底切线水平 → 圆心在 (A_x + R, A_y)）
  // 这样弧从 A 先朝下、再朝右弯到弧底，凹面朝右上 — 与原题图一致
  const Ox = A_x + Rpx;
  const Oy = A_y;

  // P 块外轮廓（一笔画完，含右上凹弧）
  ctx.fillStyle = '#a8aab0';
  ctx.beginPath();
  ctx.moveTo(P_left_x, yGround);                  // 左下
  ctx.lineTo(P_left_x, P_top_y);                  // 左上
  ctx.lineTo(A_x, P_top_y);                       // 上表面右端 = A
  // 弧从 A（angle 3π/2）顺时针到弧底（angle 2π=0）
  // 新圆心 (A_x+R, A_y) 下：A relative O = (-R, 0) → angle π；弧底 relative O = (0, R) → angle π/2
  // 90° 短弧需 anticlockwise=true（angle π → π/2 逆时针走 90°，经过左下方区域 → 弧凹向右上）
  ctx.arc(Ox, Oy, Rpx, Math.PI, Math.PI/2, true);
  // 现在在 (arcBot_x, arcBot_y)
  ctx.lineTo(arcBot_x, yGround);                  // 沿右侧下到地面
  ctx.closePath();
  ctx.fill();
  // P 边线
  ctx.strokeStyle = '#5d6068'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(P_left_x, yGround);
  ctx.lineTo(P_left_x, P_top_y);
  ctx.lineTo(A_x, P_top_y);
  ctx.stroke();
  // 弧线（用粗黑色突出"轨道"）
  ctx.strokeStyle = '#1d1d1f'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  // 新圆心 (A_x+R, A_y) 下：A relative O = (-R, 0) → angle π；弧底 relative O = (0, R) → angle π/2
  // 90° 短弧需 anticlockwise=true（angle π → π/2 逆时针走 90°，经过左下方区域 → 弧凹向右上）
  ctx.arc(Ox, Oy, Rpx, Math.PI, Math.PI/2, true);
  ctx.stroke();

  // P 标
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '900 13px "Cambria Math",serif';
  ctx.fillText('P', P_left_x + W_P_left/2 - 5, yGround - 6);
  // A 点 + 标
  ctx.fillStyle = '#16613f';
  ctx.beginPath(); ctx.arc(A_x, A_y, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.font = 'italic 900 13px "Cambria Math",serif';
  ctx.fillText('A', A_x + 5, A_y - 4);

  // Q 板（紧挨 P 弧底右侧，水平薄板）— 缩短让装置占左半 < 0.45w
  const Qx_start = arcBot_x + (qOffset || 0);
  const Qlen = w*0.22;
  const Qy_top = arcBot_y;            // Q 板上表面与弧底等高
  ctx.fillStyle = '#3f6f8f';
  ctx.fillRect(Qx_start, Qy_top, Qlen, H_Q);
  // Q 板下方支撑（如果 qOffset=0，紧挨 P 块；qOffset>0 时悬空显示分离）
  if((qOffset || 0) > 0){
    // 显示 Q 已脱离 P：在 Q 板下方画一个细缝隙提示
    ctx.fillStyle = 'rgba(180,68,46,0.18)';
    ctx.fillRect(arcBot_x, Qy_top, qOffset, H_Q);
  }
  // Q 标
  ctx.fillStyle = '#fff';
  ctx.font = '900 11px "Cambria Math",serif';
  ctx.fillText('Q', Qx_start + 12, Qy_top + 8);

  // 弹簧（在 Q 上方，水平放置）
  // 左端为弹簧自由端 = 小球压住的位置；右端固定在 Q 板末端的立柱
  // 弹簧从 Q 板左端开始（紧接弧底，便于小球从弧底滑出立刻接触弹簧）
  const springGap = 7;        // 弹簧距 Q 上表面距离
  const spring_y = Qy_top - springGap;
  const spring_left = Qx_start + Qlen*0.10;   // 弹簧左端（自由，紧接弧底）
  const spring_right = Qx_start + Qlen*0.88;  // 弹簧右端（固定立柱）
  ctx.strokeStyle = '#5d6964'; ctx.lineWidth = 1.6;
  ctx.beginPath();
  const N_coil = 12;
  for(let s = 0; s <= 1; s += 0.02){
    const sx = spring_left + s*(spring_right - spring_left);
    const sy = spring_y + Math.sin(s*Math.PI*N_coil)*4;
    if(s === 0) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
  }
  ctx.stroke();
  // 弹簧右端固定立柱
  ctx.fillStyle = '#1d1d1f';
  ctx.fillRect(spring_right, spring_y - 8, 3, 16);
  // 弹簧左端自由（小圆点示意）
  ctx.fillStyle = '#5d6964';
  ctx.beginPath(); ctx.arc(spring_left, spring_y, 3, 0, Math.PI*2); ctx.fill();

  // 小球（如果给了位置）
  if(ballPos){
    ctx.fillStyle = '#c2611f';
    ctx.beginPath(); ctx.arc(ballPos.x, ballPos.y, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '700 9px "Noto Sans SC",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('m', ballPos.x, ballPos.y+3);
    ctx.textAlign = 'left';
  }

  return {
    P_left_x, P_top_y, W_P_left, H_P,
    A_x, A_y,
    arcBot_x, arcBot_y,
    Ox, Oy, Rpx,
    Qx_start, Qy_top, Qlen, H_Q,
    spring_left, spring_right, spring_y,
    yGround
  };
}

// 单独画球（drawApparatus 不画球时使用）
function drawBall(ctx, pos){
  ctx.fillStyle = '#c2611f';
  ctx.beginPath(); ctx.arc(pos.x, pos.y, 8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = '700 9px "Noto Sans SC",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('m', pos.x, pos.y+3);
  ctx.textAlign = 'left';
}

function drawStage1(ctx, x, y, w, h, state){
  // 先画装置（不带球）拿到几何
  const a = drawApparatus(ctx, x, y, w, h, null, 0);
  // 球沿弧从 A (angle π) 逆时针到弧底 (angle π/2)：先朝下、再朝右弯
  const ang = Math.PI - state.u * Math.PI/2;
  const ball = {
    x: a.Ox + a.Rpx * Math.cos(ang),
    y: a.Oy + a.Rpx * Math.sin(ang)
  };
  drawBall(ctx, ball);

  // 推导卡
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x+w*0.55, y+10, w*0.4, h*0.35, 8);ctx.fill();ctx.stroke();}
  let yy = y+30;
  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('A 在弧顶，弧底在地面', x+w*0.55+12, yy); yy += 18;
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 12px "Cambria Math",serif';
  ctx.fillText('A 高于弧底 R（圆弧半径）', x+w*0.55+12, yy); yy += 18;
  ctx.fillText('W_重 = m·g·R', x+w*0.55+12, yy); yy += 22;
  ctx.fillStyle = '#16613f';
  ctx.font = '900 13px "Cambria Math",serif';
  ctx.fillText('答 (1)：W = mgR', x+w*0.55+12, yy);

  // 答案
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1.5;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x+w-200, y+h-44, 188, 32, 8);ctx.fill();ctx.stroke();}
  ctx.fillStyle = '#c2611f';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('(1) W = mgR', x+w-188, y+h-22);
}

function drawStage2(ctx, x, y, w, h, state){
  // 先画装置（不带球）拿到几何
  const a = drawApparatus(ctx, x, y, w, h, null, 0);
  const B_y = a.A_y - 90;     // B 在 A 正上方（h_BA 视觉 90px）
  let ball;
  if(state.u < 0.3){
    // 自由落 B → A
    const k = state.u/0.3;
    ball = {x: a.A_x, y: B_y + (a.A_y - B_y)*k};
  } else if(state.u < 0.7){
    // 沿弧 A → 弧底（angle π → π/2 逆时针：先朝下、再朝右弯，凹面朝右上）
    const k = (state.u-0.3)/0.4;
    const ang = Math.PI - k * Math.PI/2;
    ball = {
      x: a.Ox + a.Rpx * Math.cos(ang),
      y: a.Oy + a.Rpx * Math.sin(ang)
    };
  } else {
    // 沿 Q 板向右压弹簧（球在 Q 上表面之上 8px = 球半径）
    const k = (state.u-0.7)/0.3;
    const xStart = a.arcBot_x;
    const xEnd   = a.spring_left;        // 弹簧左端（自由端）
    ball = {x: xStart + k*(xEnd - xStart), y: a.Qy_top - 8};
  }
  drawBall(ctx, ball);

  // B 点标
  ctx.fillStyle = '#b4442e';
  ctx.beginPath(); ctx.arc(a.A_x, B_y, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#b4442e';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('B', a.A_x - 14, B_y - 2);
  // h_BA 标
  ctx.strokeStyle = '#94a09b'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(a.A_x, B_y); ctx.lineTo(a.A_x, a.A_y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#94a09b';
  ctx.font = 'italic 700 11px Georgia,serif';
  ctx.fillText('h_BA', a.A_x + 6, (B_y + a.A_y)/2);

  // 推导
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x+w*0.5, y+10, w*0.45, h*0.5, 8);ctx.fill();ctx.stroke();}
  let yy = y+30;
  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('能量守恒（接触前后）', x+w*0.5+12, yy); yy += 18;
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 11.5px "Cambria Math",serif';
  ctx.fillText('½m·v₀² - ½m·(v₀/√2)² = 2mgR', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('¼m·v₀² = 2mgR  →  v₀² = 8gR', x+w*0.5+12, yy); yy += 22;
  ctx.fillStyle = '#16613f';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('v₀ = 2√(2gR)', x+w*0.5+12, yy); yy += 22;
  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('B-A 距离', x+w*0.5+12, yy); yy += 18;
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 11.5px "Cambria Math",serif';
  ctx.fillText('B 到弧底（含 R）：½m·v₀² = mg(h_BA + R)', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('4gR = g(h_BA + R)  →  h_BA = 3R', x+w*0.5+12, yy); yy += 22;
  ctx.fillStyle = '#16613f';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('h_BA = 3R', x+w*0.5+12, yy);

  // 答案
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1.5;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x+w-300, y+h-44, 288, 32, 8);ctx.fill();ctx.stroke();}
  ctx.fillStyle = '#c2611f';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('(2) v₀=2√(2gR), h_BA=3R', x+w-288, y+h-22);
}

function drawStage3(ctx, x, y, w, h, state){
  // P-Q 已断开，Q 整体向右移动；小球被弹簧驱动跟随 Q 一起向右
  // 共速时弹簧最大 EP=2.2mgR
  // qOffset 缩小：避免 Q+弹簧位置进入推导卡区（x+w*0.5 起点）
  const qOffset = 15 + state.u*30;     // Q 向右脱离 P 的距离 (max 45)
  const a = drawApparatus(ctx, x, y, w, h, null, qOffset);
  // 小球贴近弹簧自由端（弹簧左端跟随 Q 一起移动）
  // 球的 x 位置 = 弹簧左端附近
  const ball = {x: a.spring_left - 4, y: a.Qy_top - 8};
  drawBall(ctx, ball);

  // 推导
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x+w*0.5, y+10, w*0.45, h*0.65, 8);ctx.fill();ctx.stroke();}
  let yy = y+30;
  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('断开瞬间状态', x+w*0.5+12, yy); yy += 18;
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 11.5px "Cambria Math",serif';
  ctx.fillText('小球 v₁ = v₀/√2，v₁²=4gR', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('Q 静止，弹簧 EP=2mgR', x+w*0.5+12, yy); yy += 22;

  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('共速时弹簧最大 EP=2.2mgR', x+w*0.5+12, yy); yy += 18;
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 11.5px "Cambria Math",serif';
  ctx.fillText('动量守恒：m·v₁ = (m+M)·v_共', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('能量守恒：', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('½m·v₁² + 2mgR = ½(m+M)·v_共² + 2.2mgR', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('代入：½m·v₁²·M/(m+M) = 0.2mgR', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('2mgR·M/(m+M) = 0.2mgR', x+w*0.5+12, yy); yy += 18;
  ctx.fillStyle = '#16613f';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('M/(m+M) = 1/10  →  M = m/9', x+w*0.5+12, yy); yy += 24;

  // 答案
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1.5;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x+w-200, y+h-44, 188, 32, 8);ctx.fill();ctx.stroke();}
  ctx.fillStyle = '#c2611f';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('(3) M = m/9', x+w-188, y+h-22);
}

function drawStage4(ctx, x, y, w, h, state){
  // Q 最终动能最大 → 弹簧恢复原长 + 小球速度=0
  // Q 已脱离 P 向右远去，小球停在 P 弧底点（视觉贴 P 内凹弧底，避免悬浮）
  // qOffset 缩小：避免 Q+弹簧立柱进入推导卡区（x+w*0.5 起点）
  const qOffset = 25 + state.u*40;     // max 65
  const a = drawApparatus(ctx, x, y, w, h, null, qOffset);
  // 小球贴 P 弧底（球中心在弧底点正上 8px，球底刚好等于 arcBot_y）
  // 注：Q 已远离 → 球右半下方虽空但停在 P 弧底凹陷处合理
  const ball = {x: a.arcBot_x - 4, y: a.arcBot_y - 8};
  drawBall(ctx, ball);

  // 推导
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x+w*0.5, y+10, w*0.45, h*0.65, 8);ctx.fill();ctx.stroke();}
  let yy = y+30;
  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('Q 最终动能最大条件', x+w*0.5+12, yy); yy += 18;
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 11.5px "Cambria Math",serif';
  ctx.fillText('弹簧恢复原长 + 小球速度 v_m = 0', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('（此时 Q 速度 = v_Q 最大）', x+w*0.5+12, yy); yy += 22;

  ctx.fillStyle = '#a85219';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText('动量守恒 + 能量守恒', x+w*0.5+12, yy); yy += 18;
  ctx.fillStyle = '#1d1d1f';
  ctx.font = '700 11.5px "Cambria Math",serif';
  ctx.fillText('m·v₁ = M\'·v_Q (动量)', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('½m·v₁² + 2mgR = ½M\'·v_Q² (能量)', x+w*0.5+12, yy); yy += 22;
  ctx.fillText('代入 v_Q = m·v₁/M\'：', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('½m·v₁² + 2mgR = m²·v₁²/(2M\')', x+w*0.5+12, yy); yy += 16;
  ctx.fillText('v₁²=4gR：4mgR = 2m²gR/M\'', x+w*0.5+12, yy); yy += 22;
  ctx.fillStyle = '#16613f';
  ctx.font = '900 12px "Cambria Math",serif';
  ctx.fillText('M\' = m/2', x+w*0.5+12, yy);

  // 答案
  ctx.fillStyle = '#fdf3e6';
  ctx.strokeStyle = '#c2611f'; ctx.lineWidth = 1.5;
  if(ctx.roundRect){ctx.beginPath();ctx.roundRect(x+w-200, y+h-44, 188, 32, 8);ctx.fill();ctx.stroke();}
  ctx.fillStyle = '#c2611f';
  ctx.font = '900 13px "Noto Sans SC",sans-serif';
  ctx.fillText("(4) M' = m/2", x+w-188, y+h-22);
}
