<title>第 6 题 · 双线框进出磁场</title>
<link rel="stylesheet" href="../../../_shared/q-shell.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<body>
<div id="app"></div>

<script>
// 物理: 归一化 L=1, B=1, m=1, R=1; v0=4 让甲恰好停在出场处
const v0 = 4;
const fieldX0 = 1, fieldX1 = 5;     // 场宽 d=4 > 2L
const frameLen = 2;                  // 沿运动方向 2L

const S = {
  a: { x: -frameLen, v: v0, Q: 0, R: 1 },   // 甲 (R)
  b: { x: -frameLen, v: v0, Q: 0, R: 2 }    // 乙 (2R)
};

function emfFlag(xleft){
  const xright = xleft + frameLen;
  if(xright<=fieldX0) return 0;
  if(xleft>=fieldX1) return 0;
  if(xleft>=fieldX0 && xright<=fieldX1) return 0;
  return 1;
}

function step(state, dt){
  const has = emfFlag(state.x);
  const F = has ? -state.v / state.R : 0;   // -B²L²v/R, B=L=1
  state.v += F * dt;
  state.x += state.v * dt;
  state.Q += has ? state.v*state.v/state.R*dt : 0;
}

function reset(){
  S.a.x = -frameLen; S.a.v = v0; S.a.Q = 0;
  S.b.x = -frameLen; S.b.v = v0; S.b.Q = 0;
}

let lastT = 0;
function evalState(t){
  if(t < lastT){ reset(); lastT = 0; }
  const sub = 16;
  const dt = (t - lastT) / sub;
  for(let k=0; k<sub; k++){ step(S.a, dt); step(S.b, dt); }
  lastT = t;
  let phase = 1;
  if(S.a.x + frameLen <= fieldX0) phase = 1;
  else if(S.a.x < fieldX0) phase = 1;
  else if(S.a.x + frameLen <= fieldX1) phase = 2;
  else if(S.a.x < fieldX1) phase = 3;
  else phase = 4;
  return {phase: Math.min(phase, 3), state: {a:{...S.a}, b:{...S.b}}};
}

function drawScene(ctx, view, state, t, opts){
  const W = view.w, H = view.h;
  const px = x => 60 + (x+2.5)/10*(W-100);
  const py = yfrac => H*yfrac;

  // 磁场区
  ctx.fillStyle = 'rgba(63,111,143,.10)';
  ctx.fillRect(px(fieldX0), py(0.07), px(fieldX1)-px(fieldX0), py(0.93)-py(0.07));
  ctx.strokeStyle = 'rgba(63,111,143,.4)'; ctx.lineWidth = 1.4; ctx.setLineDash([5,4]);
  ctx.strokeRect(px(fieldX0)+.5, py(0.07)+.5, px(fieldX1)-px(fieldX0)-1, py(0.93)-py(0.07)-1);
  ctx.setLineDash([]);
  // ⊗ 标记 — 减密 (4×3=12 → 3×2=6)
  ctx.strokeStyle = 'rgba(63,111,143,.65)'; ctx.lineWidth = 1.3;
  for(let i=0; i<3; i++){
    for(let j=0; j<2; j++){
      const cx = px(fieldX0) + (i+.5)*(px(fieldX1)-px(fieldX0))/3;
      const cy = py(0.10) + (j+.5)*(py(0.90)-py(0.10))/2;
      ctx.beginPath(); ctx.arc(cx,cy,4.5,0,Math.PI*2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx-3,cy-3); ctx.lineTo(cx+3,cy+3);
      ctx.moveTo(cx+3,cy-3); ctx.lineTo(cx-3,cy+3);
      ctx.stroke();
    }
  }
  ctx.fillStyle = '#3f6f8f';
  ctx.font = '800 13px "Noto Sans SC",sans-serif';
  ctx.fillText('磁场区  B ⊗', px(fieldX0)+10, py(0.07)+18);

  // x 轴
  ctx.strokeStyle = '#94a09b'; ctx.lineWidth = 1;
  const yT = py(0.97);
  ctx.beginPath(); ctx.moveTo(40, yT); ctx.lineTo(W-20, yT); ctx.stroke();
  ctx.fillStyle = '#94a09b'; ctx.font = '10px ui-monospace,monospace';
  for(let xv=-2; xv<=7; xv++){
    const x = px(xv);
    ctx.beginPath(); ctx.moveTo(x, yT); ctx.lineTo(x, yT+4); ctx.stroke();
    if(xv % 2 === 0) ctx.fillText(xv+'L', x-6, yT+15);
  }

  // 画两个线框
  drawFrame(ctx, S.a, '甲 (R)', '#c2611f', 0.32, px, py);
  drawFrame(ctx, S.b, '乙 (2R)', '#3f6f8f', 0.62, px, py);
}

function drawFrame(ctx, state, label, color, yMid, px, py){
  const has = emfFlag(state.x);
  const h = 50;
  const cy = py(yMid);
  // 框
  ctx.strokeStyle = color; ctx.lineWidth = 2.6;
  ctx.beginPath();
  ctx.rect(px(state.x), cy-h/2, px(state.x+frameLen)-px(state.x), h);
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,253,249,.6)';
  ctx.fillRect(px(state.x)+1, cy-h/2+1, px(state.x+frameLen)-px(state.x)-2, h-2);
  // 标签
  ctx.fillStyle = color;
  ctx.font = '800 13px "Noto Sans SC",sans-serif';
  ctx.fillText(label, px(state.x)+6, cy-h/2-6);
  // 速度数值
  ctx.font = '600 11px ui-monospace,monospace';
  ctx.fillStyle = '#5d6964';
  ctx.fillText('v = '+(state.v/v0).toFixed(2)+' v₀', px(state.x)+6, cy+h/2+14);

  // 感应电流箭头
  if(has){
    const exiting = (state.x + frameLen) > fieldX1 && state.x < fieldX1;
    const dir = exiting ? -1 : 1;
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 1.5;
    const w = px(state.x+frameLen) - px(state.x);
    const arrows = [
      {x1:px(state.x)+w*.3, y1:cy-h/2, x2:px(state.x)+w*.7, y2:cy-h/2},
      {x1:px(state.x+frameLen), y1:cy-h*.3, x2:px(state.x+frameLen), y2:cy+h*.3},
      {x1:px(state.x)+w*.7, y1:cy+h/2, x2:px(state.x)+w*.3, y2:cy+h/2},
      {x1:px(state.x), y1:cy+h*.3, x2:px(state.x), y2:cy-h*.3}
    ];
    arrows.forEach(a=>{
      const x1=dir>0?a.x1:a.x2, y1=dir>0?a.y1:a.y2, x2=dir>0?a.x2:a.x1, y2=dir>0?a.y2:a.y1;
      const ang = Math.atan2(y2-y1, x2-x1);
      const mx = (x1+x2)/2 + Math.cos(ang)*8;
      const my = (y1+y2)/2 + Math.sin(ang)*8;
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(mx-7*Math.cos(ang-.4), my-7*Math.sin(ang-.4));
      ctx.lineTo(mx-7*Math.cos(ang+.4), my-7*Math.sin(ang+.4));
      ctx.closePath(); ctx.fill();
    });
  }

  // 速度向量
  if(state.v > 0.01){
    const cx = (px(state.x) + px(state.x+frameLen))/2;
    const vlen = state.v * 15;
    PPath.arrow(ctx, cx, cy, cx+vlen, cy, '#16613f', 2);
  }
}

PathQuestion({
  paperTitle: '陕晋宁青卷',
  paperHref: '../../index.html',
  eyebrow: '单选 · 第 6 题 · 4 分 · B 级 · 双 agent 审',
  title: '双线框进出磁场 · 电磁感应',
  subtitle: '甲（电阻 R）、乙（电阻 2R）两线框以相同初速度并排进入宽磁场区。比较合力、速度、焦耳热。',
  originalProblem: {
    meta: '2025 陕晋宁青卷 · 第 6 题 · 4 分',
    image: '../../source/images/image37.png',
    text: `如图，光滑水平面上存在竖直向上、宽度 <b>d</b> 大于 <b>2L</b> 的匀强磁场，其磁感应强度大小为 <b>B</b>。甲、乙两个合金导线框的质量均为 <b>m</b>，长均为 <b>2L</b>，宽均为 <b>L</b>，电阻分别为 <b>R</b> 和 <b>2R</b>。两线框在光滑水平面上以相同初速度并排进入磁场，忽略两线框之间的相互作用。则（　　）`,
    subQuestions: [
      'A. 甲线框进磁场和出磁场的过程中电流方向相同',
      'B. 甲、乙线框刚进磁场区域时，所受合力大小之比为 1:2',
      'C. 乙线框恰好完全出磁场区域时，速度大小为 0',
      'D. 甲、乙线框从刚进磁场区域到完全出磁场区域产生的焦耳热之比为 4:3'
    ],
    officialAnswer: 'D · A 错（进、出方向相反）。B 错（实际比 2:1 不是 1:2）。C 错（v_乙_final = v₀/2 ≠ 0）。D 对：设 v₀=4B²L³/(mR) 使甲恰好停下，由能量守恒得 Q₁:Q₂ = (½mv₀²) : (3mv₀²/8) = 4:3。'
  },
  deliv: {
    title: '双线框进出磁场',
    sub: '同 m、同 v₀、同 L 不同 R · 答案 D · 焦耳热比 4:3 不是 2:1'
  },
  totalT: 6,
  speedFactor: 0.42,
  evalState,
  drawScene,
  phases: [
    {label:'阶段 1 · 进入', label_short:'阶段 1',
     formula_tex: String.raw`\varepsilon = BLv,\;\; I=\dfrac{\varepsilon}{R},\;\; F=BIL=\dfrac{B^2L^2v}{R}`,
     note:'前缘切割磁感线 → 感应电动势 → 电流 → 安培力反向 → 减速。R 越小电流越大力越大。'},
    {label:'阶段 2 · 全在场内', label_short:'阶段 2',
     formula_tex: String.raw`\Delta\Phi = 0 \;\Rightarrow\; \varepsilon = 0,\;\; F = 0`,
     note:'两条边同时切割且方向相反，磁通量不变 → 无 EMF → 匀速直线。'},
    {label:'阶段 3 · 离开', label_short:'阶段 3',
     formula_tex: String.raw`\Delta p = \int F\,dt = \dfrac{B^2L^2}{R}\,\Delta s`,
     note:'后缘切割 → 反向感应电流 → 再次减速。由动量定理：mΔv = B²L²·Δs/R。'}
  ],
  stats: [
    {label:'甲 v₁',   fmt: s=>s.state ? (s.state.a.v/v0).toFixed(3)+' v₀' : '—'},
    {label:'乙 v₂',   fmt: s=>s.state ? (s.state.b.v/v0).toFixed(3)+' v₀' : '—'},
    {label:'甲 Q₁',   fmt: s=>s.state ? (s.state.a.Q/(0.5*v0*v0)).toFixed(3)+' ½mv₀²' : '—'},
    {label:'乙 Q₂',   fmt: s=>s.state ? (s.state.b.Q/(0.5*v0*v0)).toFixed(3)+' ½mv₀²' : '—'},
    {label:'Q₁:Q₂',  fmt: s=>s.state && s.state.b.Q>0.001 ? (s.state.a.Q/s.state.b.Q).toFixed(3) : '—'}
  ],
  conclusions: [
    {label_text:'A 错', value_text:'方向相反', note:'进=顺时针 出=逆时针'},
    {label_text:'B 错', value_text:'比例不是 1:2', note:'实际刚进场时 F甲:F乙 = 2:1（甲电流大），题目选项 B 表述错误'},
    {label_text:'C 错', value_text:'乙不停', note:'v_乙_final = v₀/2'},
    {label_text:'D ✓', value_tex: String.raw`Q_1 : Q_2 = 4 : 3`, note:'由能量守恒：甲损全部 ½mv₀²，乙损 ⅜mv₀²'}
  ],
  legend: [
    {swatch:{bg:'#c2611f',border:'#c2611f',type:'rect'}, text:'甲线框（电阻 R）'},
    {swatch:{bg:'#3f6f8f',border:'#3f6f8f',type:'rect'}, text:'乙线框（电阻 2R）'},
    {swatch:{bg:'rgba(63,111,143,.10)',border:'#3f6f8f',type:'rect'}, text:'磁场区 B ⊗ 入纸面'}
  ],
  timeline: [
    {name:'1 · 进入', sub:'位移 2L · EMF · 减速'},
    {name:'2 · 全在场内', sub:'位移 d−2L · 匀速'},
    {name:'3 · 离开', sub:'位移 2L · EMF · 再减速'}
  ],
  defaults: {speed:1.0, lineW:3.5, vec:true, guide:false},
  fileName: '陕西卷-Q6-双线框磁场'
});
</script>
