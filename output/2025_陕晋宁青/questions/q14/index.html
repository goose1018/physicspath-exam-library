<title>第 14 题 · 双带电粒子相互作用</title>
<link rel="stylesheet" href="../../../_shared/q-shell.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>

<body>
<div id="app"></div>
<script src="../../../_shared/q-shell.js"></script>
<script>
// 归一化: m=1, v₀=1, r₀=1, K=1/3, F_const=0.5, t_F=2
const K = 1/3;
const F_const = 0.5;
const initial = {xA:0, xB:1, vA:1, vB:0, phase:1, WF:0};
let S = {...initial};
let lastT = 0;

function step(dt){
  // 距离下限保护：小 r 时库仑力会爆炸，钳制最小距离
  let r = S.xB - S.xA;
  if(r < 0.05) r = 0.05;       // 钳制下限避免 1/r² 爆炸
  // 半隐式 Euler：先更新速度再更新位置（更稳定）
  const fA = -K/(r*r);          // mass m=1
  let fB =  K/(r*r) / 2;        // mass 2m
  if(S.phase === 2) fB += F_const/2;
  // 限制单步速度变化，避免大跳
  const dvA = Math.max(-0.5, Math.min(0.5, fA*dt));
  const dvB = Math.max(-0.5, Math.min(0.5, fB*dt));
  S.vA += dvA;
  S.vB += dvB;
  const dxA = S.vA*dt;
  const dxB = S.vB*dt;
  S.xA += dxA;
  S.xB += dxB;
  if(S.phase === 2) S.WF += F_const * dxB;

  // 阶段切换：放宽容差
  if(S.phase === 1 && S.vA <= S.vB + 0.01){
    // 共速判定：vA 不再大于 vB 即认为共速
    S.phase = 2;
    S.vA = 1/3; S.vB = 1/3;
  }
  if(S.phase === 2 && S.vA <= 0.01 && (S.xB - S.xA) >= 0.95){
    S.phase = 3; S.vA = 0; S.vB = 1;
  }
}

function evalState(t){
  if(t < lastT){ S = {...initial}; lastT = 0; }
  if(S.phase < 3){
    const sub = 200;            // 60 → 200 子步，提升稳定性
    const dt = (t - lastT)/sub;
    for(let k=0; k<sub; k++) step(dt);
  }
  lastT = t;
  return {phase: S.phase};
}

function drawScene(ctx, view, state, t, opts){
  const W = view.w, H = view.h;
  // 主图区
  drawParticles(ctx, 0, 0, W, H*0.65);
  // 能量条
  drawEnergyBars(ctx, 0, H*0.66, W, H*0.34);
}

function drawParticles(ctx, x, y, w, h){
  const r = S.xB - S.xA;
  const cy = y + h*0.55;
  const px = xv => x + 50 + (xv+0.3)/3.8 * (w-100);

  // 库仑力示意
  if(S.phase < 3 && r > 0.01){
    const cxA = px(S.xA), cxB = px(S.xB);
    const fmag = Math.min(60, 30/(r*r));
    PPath.arrow(ctx, cxA, cy-30, cxA-fmag, cy-30, '#b4442e', 2);
    PPath.arrow(ctx, cxB, cy-30, cxB+fmag/2, cy-30, '#b4442e', 2);
    ctx.strokeStyle = 'rgba(180,68,46,.25)'; ctx.setLineDash([3,4]); ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(cxA, cy); ctx.lineTo(cxB, cy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#5d6964';
    ctx.font = '700 11px ui-monospace,monospace';
    ctx.fillText('r = '+r.toFixed(2)+' r₀', (cxA+cxB)/2 - 28, cy-44);
  }

  // x 轴
  ctx.strokeStyle = '#c4b89e'; ctx.lineWidth = 1;
  const yT = y + h*0.92;
  ctx.beginPath(); ctx.moveTo(x+40, yT); ctx.lineTo(x+w-20, yT); ctx.stroke();
  ctx.fillStyle = '#94a09b'; ctx.font = '10px ui-monospace,monospace';
  for(let xv=0; xv<=3; xv+=0.5){
    const xx = px(xv);
    ctx.beginPath(); ctx.moveTo(xx, yT); ctx.lineTo(xx, yT+4); ctx.stroke();
    ctx.fillText(xv.toFixed(1)+'r₀', xx-12, yT+15);
  }

  // 粒子
  drawParticle(ctx, px(S.xA), cy, 1, S.vA, '#c2611f', 'A', 'm', false);
  drawParticle(ctx, px(S.xB), cy, 2, S.vB, '#3f6f8f', 'B', '2m', S.phase===2);
}

function drawParticle(ctx, cx, cy, mass, vel, color, label, mlbl, withF){
  const radius = mass===1 ? 14 : 19;
  // 光晕
  const grd = ctx.createRadialGradient(cx,cy,1,cx,cy,radius*2);
  grd.addColorStop(0, color+'cc');
  grd.addColorStop(1, color+'00');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx,cy,radius*2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(cx,cy,radius,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5; ctx.stroke();
  // 标签
  ctx.fillStyle = '#fff';
  ctx.font = '900 14px "Cambria Math",serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy+1);
  ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
  ctx.fillStyle = color;
  ctx.font = '700 11px "Noto Sans SC",sans-serif';
  ctx.fillText('+ '+mlbl, cx-radius+2, cy+radius+14);

  // 速度
  if(Math.abs(vel) > 0.005){
    const vlen = vel*60;
    PPath.arrow(ctx, cx, cy-radius-6, cx+vlen, cy-radius-6, color, 2.5);
    ctx.fillStyle = color;
    ctx.font = '600 10px ui-monospace,monospace';
    ctx.fillText('v='+vel.toFixed(2)+'v₀', cx+vlen+(vlen>0?6:-60), cy-radius-12);
  }

  // F 力
  if(withF){
    const flen = 50;
    PPath.arrow(ctx, cx, cy+radius+8, cx+flen, cy+radius+8, '#16613f', 3);
    ctx.fillStyle = '#16613f';
    ctx.font = '900 12px "Cambria Math",serif';
    ctx.fillText('F', cx+flen+6, cy+radius+12);
  }
}

function drawEnergyBars(ctx, x, y, w, h){
  ctx.fillStyle = '#fffdf9';
  ctx.strokeStyle = '#eadfce'; ctx.lineWidth = 1;
  if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x+12,y,w-24,h-12,12); ctx.fill(); ctx.stroke(); }
  else { ctx.fillRect(x+12,y,w-24,h-12); ctx.strokeRect(x+12,y,w-24,h-12); }

  const r = Math.max(0.01, S.xB - S.xA);
  const Ka = 0.5*S.vA*S.vA;
  const Kb = 0.5*2*S.vB*S.vB;
  const Ep = K/r;
  const items = [
    {label:'A 动能', val:Ka, color:'#c2611f'},
    {label:'B 动能', val:Kb, color:'#3f6f8f'},
    {label:'电势能', val:Ep, color:'#b4442e'},
    {label:"F 做功", val:S.WF, color:'#16613f'}
  ];
  const lblW = 70, valW = 80, gap = 12;
  const trackW = w - 24 - lblW - valW - 3*gap - 12;
  const barH = 12;
  items.forEach((it,i)=>{
    const yy = y + 14 + i*((h-22)/4);
    ctx.fillStyle = '#5d6964';
    ctx.font = '700 12px "Noto Sans SC",sans-serif';
    ctx.fillText(it.label, x+22, yy+barH-2);
    // 轨道
    ctx.fillStyle = '#f4f1ea';
    ctx.fillRect(x+22+lblW, yy, trackW, barH);
    ctx.strokeStyle = '#eadfce';
    ctx.strokeRect(x+22+lblW, yy, trackW, barH);
    // 填充
    const pct = Math.min(1, Math.max(0, it.val/1.2));
    ctx.fillStyle = it.color;
    ctx.fillRect(x+22+lblW, yy, trackW*pct, barH);
    // 数值
    ctx.fillStyle = '#1d1d1f';
    ctx.font = '700 12px ui-monospace,monospace';
    ctx.fillText(it.val.toFixed(3), x+22+lblW+trackW+gap, yy+barH-2);
  });
}

PathQuestion({
  paperTitle: '陕晋宁青卷',
  paperHref: '../../index.html',
  eyebrow: '计算 · 第 14 题 · B 级 · 双 agent 审',
  title: '双带电粒子 · 动量与能量守恒',
  subtitle: '同性 A、B 粒子（质量 m、2m）。A 以 v₀ 追 B → 共速 → 对 B 施加恒力 → A 停下、B 速度 v₀、距离恢复 r₀。',
  originalProblem: {
    meta: '2025 陕晋宁青卷 · 第 14 题 · 14 分',
    image: '../../source/images/image182.png',
    text: `如图，有两个电性相同且质量分别为 <b>m</b>、<b>2m</b> 的粒子 A、B，初始时刻相距 <b>r₀</b>。粒子 A 以速度 <b>v₀</b> 沿两粒子连线向速度为 0 的粒子 B 运动，此时 A、B 两粒子系统的电势能等于 <b>⅓ mv₀²</b>。经时间 <b>t₀</b> 粒子 B 到达 P 点，此时两粒子速度相同，同时开始给粒子 B 施加一恒力 F，方向与速度方向相同。当粒子 B 的速度为 <b>v₀</b> 时，粒子 A 恰好运动至 P 点且速度为 0，A、B 粒子间距离恢复为 <b>r₀</b>，这时撤去恒力。已知任意两带电粒子系统的电势能与其距离成反比，忽略两粒子所受重力。<b>（m、v₀、r₀、t₀ 均为已知量）</b>`,
    subQuestions: [
      '粒子 B 到达 P 点时的速度大小；',
      '时间 t₀ 内粒子 B 的位移大小；',
      '恒力作用的时间。'
    ],
    officialAnswer: '(1) v_P = v₀/3（动量守恒 mv₀ = 3m·v_P）　(2) s_B = v₀t₀/3 − r₀/6（动量积分 + 位移关系联立）　(3) t_F = 2r₀/v₀（F·t_F = mv₀ 与 F·r₀ = ½mv₀² 联立得 F = mv₀²/(2r₀)）'
  },
  deliv: {
    title: '双带电粒子相互作用',
    sub: '答案：v_P = v₀/3 · s_B = v₀t₀/3 − r₀/6 · t_F = 2r₀/v₀'
  },
  totalT: 4,
  speedFactor: 1.0,
  evalState,
  drawScene,
  phases: [
    {label:'阶段 1 · A 追 B', label_short:'阶段 1',
     formula_tex: String.raw`mv_0 = 3m\,v_P \;\Rightarrow\; v_P = \dfrac{v_0}{3}`,
     note:'动量守恒：A 追上 B 共速时，由 m·v₀ = (m+2m)·v_P，得 v_P = v₀/3。能量守恒得 r_P = r₀/2。'},
    {label:'阶段 2 · 恒力 F 推 B', label_short:'阶段 2',
     formula_tex: String.raw`F\!\cdot\!t_F = \Delta p = mv_0,\quad F\!\cdot\!r_0 = \tfrac{1}{2}mv_0^2`,
     note:'B 受恒力加速，A 因库仑斥力减速。最终 A 停下、B 达 v₀、距离恢复 r₀ → F = mv₀²/(2r₀)，t_F = 2r₀/v₀。'},
    {label:'阶段 3 · 撤力·完成', label_short:'阶段 3',
     formula_tex: String.raw`v_A = 0,\;\; v_B = v_0,\;\; r = r_0`,
     note:'撤去恒力，过程结束。系统总动量 = 2mv₀（外力贡献），能量恢复初始电势能。'}
  ],
  stats: [
    {label:'阶段',     fmt:s=>'阶段 '+s.phase},
    {label:'距离 r/r₀', fmt:()=>(S.xB-S.xA).toFixed(3)},
    {label:'v_A / v₀', fmt:()=>(S.vA>=0?'+':'')+S.vA.toFixed(3)},
    {label:'v_B / v₀', fmt:()=>S.vB.toFixed(3)},
    {label:'总动量 p',  fmt:()=>(S.vA + 2*S.vB).toFixed(3)+' mv₀'},
    {label:'总能量 E',  fmt:()=>{const r=Math.max(0.01,S.xB-S.xA);return (0.5*S.vA*S.vA+0.5*2*S.vB*S.vB+K/r).toFixed(3)+' mv₀²';}}
  ],
  conclusions: [
    {label_text:'(1)', value_tex: String.raw`v_P = \dfrac{v_0}{3}`,                  note:'动量守恒'},
    {label_text:'(2)', value_tex: String.raw`s_B = \dfrac{v_0 t_0}{3} - \dfrac{r_0}{6}`, note:'动量积分 + 位移关系'},
    {label_text:'(3)', value_tex: String.raw`t_F = \dfrac{2 r_0}{v_0}`,               note:'F·t_F=mv₀, F·r₀=½mv₀²'}
  ],
  legend: [
    {swatch:{bg:'#c2611f',border:'#c2611f',type:'dot'}, text:'A 粒子（m）'},
    {swatch:{bg:'#3f6f8f',border:'#3f6f8f',type:'dot'}, text:'B 粒子（2m）'},
    {swatch:{bg:'#b4442e',border:'#b4442e',type:'rect'}, text:'库仑斥力'},
    {swatch:{bg:'#16613f',border:'#16613f',type:'rect'}, text:'外加恒力 F（仅阶段 2）'}
  ],
  timeline: [
    {name:'1 · A 追 B', sub:'库仑斥力，共速时 r=r₀/2'},
    {name:'2 · F 推 B', sub:'A 减速→停，B 加速→v₀'},
    {name:'3 · 完成',    sub:'距离恢复 r₀，撤去 F'}
  ],
  defaults: {speed:1.0, lineW:3.5, vec:true, guide:false},
  fileName: '陕西卷-Q14-双带电粒子'
});
</script>
